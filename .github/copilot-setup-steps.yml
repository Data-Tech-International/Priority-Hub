steps:
  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: "10.0"

  - name: Restore backend dependencies
    run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

  - name: Build backend
    run: dotnet build backend/PriorityHub.Api/PriorityHub.Api.csproj --no-restore
