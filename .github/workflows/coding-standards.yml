name: Coding Standards

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  backend-format:
    runs-on: ubuntu-latest
    name: dotnet format Backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

      - name: Check code format
        id: format-check
        run: dotnet format backend/PriorityHub.Api/PriorityHub.Api.csproj --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      - name: Comment on PR if format violations found
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Code format violations detected. Run `dotnet format backend/PriorityHub.Api/PriorityHub.Api.csproj` locally to fix.'
            })

  backend-style:
    runs-on: ubuntu-latest
    name: .NET Analyzer Build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

      - name: Build with .NET analyzers
        run: dotnet build backend/PriorityHub.Api/PriorityHub.Api.csproj --no-restore /p:EnableNETAnalyzers=true /p:TreatWarningsAsErrors=false
        continue-on-error: true
