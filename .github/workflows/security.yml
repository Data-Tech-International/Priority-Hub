name: Security Scanning

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    name: Dependency Vulnerabilities
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Frontend audit (collect)
        id: npm-audit
        run: |
          npm audit --json > npm-audit.json || true
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('npm-audit.json', 'utf8');
            const data = JSON.parse(raw);
            const v = (data.metadata && data.metadata.vulnerabilities) || {};
            const critical = Number(v.critical || 0);
            const high = Number(v.high || 0);
            const moderate = Number(v.moderate || 0);
            const low = Number(v.low || 0);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `critical=${critical}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `high=${high}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `moderate=${moderate}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `low=${low}\n`);
          "
        continue-on-error: true
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      
      - name: Restore backend dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj
      
      - name: Check for vulnerable backend packages (collect)
        id: dotnet-audit
        run: |
          dotnet list backend/PriorityHub.Api/PriorityHub.Api.csproj package --vulnerable --include-transitive --format json > dotnet-vuln.json || true
          node -e "
            const fs = require('fs');
            const toNum = (n) => Number(n || 0);
            const raw = fs.readFileSync('dotnet-vuln.json', 'utf8');
            const data = JSON.parse(raw);

            let critical = 0;
            let high = 0;
            let moderate = 0;
            let low = 0;

            const visit = (value) => {
              if (Array.isArray(value)) {
                value.forEach(visit);
                return;
              }
              if (value && typeof value === 'object') {
                const sev = String(value.severity || '').toLowerCase();
                if (sev === 'critical') critical += 1;
                else if (sev === 'high') high += 1;
                else if (sev === 'moderate' || sev === 'medium') moderate += 1;
                else if (sev === 'low') low += 1;

                Object.values(value).forEach(visit);
              }
            };

            visit(data);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `critical=${toNum(critical)}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `high=${toNum(high)}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `moderate=${toNum(moderate)}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `low=${toNum(low)}\n`);
          "
        continue-on-error: true

      - name: Enforce vulnerability policy
        id: enforce
        run: |
          npm_critical=${{ steps.npm-audit.outputs.critical || 0 }}
          npm_high=${{ steps.npm-audit.outputs.high || 0 }}
          npm_moderate=${{ steps.npm-audit.outputs.moderate || 0 }}

          dotnet_critical=${{ steps.dotnet-audit.outputs.critical || 0 }}
          dotnet_high=${{ steps.dotnet-audit.outputs.high || 0 }}
          dotnet_moderate=${{ steps.dotnet-audit.outputs.moderate || 0 }}

          high_critical_total=$((npm_critical + npm_high + dotnet_critical + dotnet_high))
          moderate_total=$((npm_moderate + dotnet_moderate))

          echo "high_critical_total=${high_critical_total}" >> "$GITHUB_OUTPUT"
          echo "moderate_total=${moderate_total}" >> "$GITHUB_OUTPUT"

          if [ "$moderate_total" -gt 0 ]; then
            echo "::warning::Detected ${moderate_total} moderate vulnerabilities. Review and patch soon."
          fi

          if [ "$high_critical_total" -gt 0 ]; then
            echo "::error::Detected ${high_critical_total} high/critical vulnerabilities. Failing build."
            exit 1
          fi

          echo "No high/critical vulnerabilities detected."
      
      - name: Report vulnerabilities on PR
        if: always() && github.event_name == 'pull_request' && (steps.enforce.outputs.high_critical_total != '0' || steps.enforce.outputs.moderate_total != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const highCritical = '${{ steps.enforce.outputs.high_critical_total }}';
            const moderate = '${{ steps.enforce.outputs.moderate_total }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ Dependency vulnerabilities detected.\n\n- High/Critical: ${highCritical}\n- Moderate: ${moderate}\n\nRun \`npm audit\` and \`dotnet list backend/PriorityHub.Api/PriorityHub.Api.csproj package --vulnerable --include-transitive\` locally to review and update.`
            })

  secret-scanning:
    runs-on: ubuntu-latest
    name: Secret Detection
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog secret scanner
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --debug --only-verified

  mcp-advisory-check:
    runs-on: ubuntu-latest
    name: Context7 Security Advisory Lookup
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract package names
        id: packages
        run: |
          echo "Frontend packages found. Advisory check prepared for MCP integration."
        continue-on-error: true
      
      - name: Note on MCP integration
        run: |
          echo "Phase 3: MCP security advisory queries will be integrated here"
          echo "This step will use context7 to resolve library IDs and check for known advisories"
