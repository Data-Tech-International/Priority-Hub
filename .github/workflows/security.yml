name: Security Scanning

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    name: Dependency Vulnerabilities
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Frontend audit
        id: npm-audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      
      - name: Restore backend dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj
      
      - name: Check for vulnerable packages
        id: dotnet-audit
        run: dotnet list package --vulnerable backend/PriorityHub.Api/PriorityHub.Api.csproj
        continue-on-error: true
      
      - name: Report vulnerabilities on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Dependency vulnerabilities detected. Run `npm audit` and `dotnet list package --vulnerable` locally to review and update.'
            })

  secret-scanning:
    runs-on: ubuntu-latest
    name: Secret Detection
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog secret scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  mcp-advisory-check:
    runs-on: ubuntu-latest
    name: Context7 Security Advisory Lookup
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Extract package names
        id: packages
        run: |
          echo "Frontend packages found. Advisory check prepared for MCP integration."
        continue-on-error: true
      
      - name: Note on MCP integration
        run: |
          echo "Phase 3: MCP security advisory queries will be integrated here"
          echo "This step will use context7 to resolve library IDs and check for known advisories"
