name: CI Pipeline

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'PriorityHub.sln'

  coding-standards:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore .NET dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

      - name: Backend format check
        run: dotnet format backend/PriorityHub.Api/PriorityHub.Api.csproj --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore .NET dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

      - name: Backend security check
        run: dotnet list package --vulnerable
        continue-on-error: true

      - name: Secret scanning
        if: >
          github.event_name == 'pull_request' ||
          (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --debug --only-verified

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore backend dependencies
        run: dotnet restore backend/PriorityHub.Api/PriorityHub.Api.csproj

      - name: Backend static analysis
        run: dotnet build backend/PriorityHub.Api/PriorityHub.Api.csproj --no-restore /p:EnforceCodeStyleInBuild=true /p:TreatWarningsAsErrors=false
        continue-on-error: true

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore backend dependencies
        run: dotnet restore backend/PriorityHub.Api.Tests/PriorityHub.Api.Tests.csproj

      - name: Backend tests
        run: dotnet test backend/PriorityHub.Api.Tests/PriorityHub.Api.Tests.csproj --logger "console;verbosity=normal" --no-restore
        continue-on-error: true

      - name: Check coverage threshold
        run: |
          echo "Coverage verification will be enhanced in future phase"
        continue-on-error: true
