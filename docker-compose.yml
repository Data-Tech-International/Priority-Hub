services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: priorityhub
      POSTGRES_USER: priorityhub
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priorityhub -d priorityhub"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
